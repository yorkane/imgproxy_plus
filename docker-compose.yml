services:
  imgproxy_plus:
    image: imgproxy_plus:latest
    container_name: imgproxy_plus
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ${PLUS_LOCAL_PATH:-./data/}:/data
      - ramdisk:/mnt/ramdisk
      - ./html:/usr/local/bin/html
    env_file:
      - .env
    networks:
      - imgproxy_net

volumes:
  ramdisk:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=512m,mode=0755"

networks:
  imgproxy_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
